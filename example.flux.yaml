api_key: your-secret-key-here

redis_addr: localhost:6379

# agent_port is the gRPC port Flux dials on each agent (default: 50052)
agent_port: 50052

# gRPC transport security — how Flux dials agents.
# Set insecure: true for development; provide certs for production.
grpc:
  insecure: true
# grpc:
#   insecure: false
#   ca_cert: certs/ca.pem
#   cert:    certs/flux.pem
#   key:     certs/flux.key
#   # Local paths on the Flux host to the agent TLS cert files.
#   # Uploaded to each node during SSH bootstrap.
#   agent:
#     ca_cert: certs/ca.pem
#     cert:    certs/agent.pem
#     key:     certs/agent.key

providers:
  aws:
    region: us-east-1
    ami: ami-0abcdef1234567890
    key_name: flux-agent-key
    subnet_id: subnet-0123456789abcdef0
    security_group_id: sg-0123456789abcdef0

    # Static credentials — optional.
    # When omitted, the default chain is used (env vars, ~/.aws/credentials, instance profile).
    # access_key_id: AKIAIOSFODNN7EXAMPLE
    # secret_access_key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY

    # SSH bootstrap — if set, Flux SSHs into the node to upload certs and agent.yaml.
    ssh_key_path: /home/user/.ssh/flux-agent-key.pem
    ssh_user: ec2-user
    agent_version: "0.1.0"   # fetched from GitHub Releases as a .deb

    tags:
      Environment: production
      Team: platform

    autoscaling:
      enabled: true
      name: aws-prod

      min_nodes: 1
      max_nodes: 10

      # Instance types this autoscaler may launch (smallest to largest).
      node_types:
        - instance_type: c5.large
          vcpus: 2
          memory_gb: 4
        - instance_type: c5.xlarge
          vcpus: 4
          memory_gb: 8
        - instance_type: c5.2xlarge
          vcpus: 8
          memory_gb: 16
        - instance_type: m5.xlarge
          vcpus: 4
          memory_gb: 16
        - instance_type: r5.xlarge
          vcpus: 4
          memory_gb: 32

      cpu_upper_threshold: 80
      cpu_lower_threshold: 20
      mem_upper_threshold: 80
      mem_lower_threshold: 20

      evaluation_window_sec: 60
      poll_interval_sec: 10
      cooldown_sec: 300
