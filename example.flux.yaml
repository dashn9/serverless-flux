api_key: your-secret-key-here

redis_addr: localhost:6379

# agent_port is the gRPC port Flux dials on each agent (default: 50052)
agent_port: 50052

# gRPC transport security — how Flux dials agents.
# Set insecure: true for development; provide certs for production.
grpc:
  insecure: true
# grpc:
#   insecure: false
#   ca_cert: certs/ca.pem
#   cert:    certs/flux.pem
#   key:     certs/flux.key
#   # Local paths on the Flux host to the agent TLS cert files.
#   # Uploaded to each node during SSH bootstrap.
#   agent:
#     ca_cert: certs/ca.pem
#     cert:    certs/agent.pem
#     key:     certs/agent.key

providers:
  aws:
    region: us-east-1
    ami: ami-064519b8c76274859
    security_group_id: sg-0123456789abcdef0

    # Static credentials — optional.
    # When omitted, the default chain is used (env vars, ~/.aws/credentials, instance profile).
    # access_key_id: AKIAIOSFODNN7EXAMPLE
    # secret_access_key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY

    # SSH access — ssh_keyname is the EC2 key pair injected into nodes at launch.
    # Anyone with the matching private key (ssh_key_path) can SSH into the node.
    ssh_keyname: flux-agent-key
    ssh_key_path: /home/user/.ssh/flux-agent-key.pem
    ssh_user: admin
    agent_version: "0.1.0"   # fetched from GitHub Releases as a .deb

    tags:
      Environment: production
      Team: platform

    autoscaling:
      enabled: true
      name: aws-prod

      min_nodes: 1
      max_nodes: 10

      # Instance types this autoscaler may launch (smallest to largest).
      node_types:
        - instance_type: c5.large
          vcpus: 2
          memory_gb: 4
        - instance_type: c5.xlarge
          vcpus: 4
          memory_gb: 8
        - instance_type: c5.2xlarge
          vcpus: 8
          memory_gb: 16
        - instance_type: m5.xlarge
          vcpus: 4
          memory_gb: 16
        - instance_type: r5.xlarge
          vcpus: 4
          memory_gb: 32

      cpu_upper_threshold: 80
      cpu_lower_threshold: 45
      mem_upper_threshold: 80
      mem_lower_threshold: 45

      evaluation_window_sec: 60
      poll_interval_sec: 10
      cooldown_sec: 300

  gcp:
    project_id: my-project
    zone: us-central1-a
    image: projects/debian-cloud/global/images/family/debian-12

    # service_account_email: flux-agent@my-project.iam.gserviceaccount.com

    ssh_key_path: /home/user/.ssh/flux-agent-key.pem
    ssh_user: ubuntu
    agent_version: "0.1.0"

    labels:
      environment: production
      team: platform

    autoscaling:
      enabled: true
      name: gcp-prod

      min_nodes: 1
      max_nodes: 10

      node_types:
        - instance_type: e2-standard-2
          vcpus: 2
          memory_gb: 8
        - instance_type: e2-standard-4
          vcpus: 4
          memory_gb: 16
        - instance_type: e2-standard-8
          vcpus: 8
          memory_gb: 32

      cpu_upper_threshold: 80
      cpu_lower_threshold: 45
      mem_upper_threshold: 80
      mem_lower_threshold: 45

      evaluation_window_sec: 60
      poll_interval_sec: 10
      cooldown_sec: 300
