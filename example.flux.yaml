api_key: your-secret-key-here

redis_addr: localhost:6379

# agent_redis_url is the Redis URL written into bootstrapped agent configs.
# Set this when agents must reach Redis via a different address than Flux does
# (e.g. Flux uses localhost, agents use a public/remote URL).
# When omitted, agents inherit redis_addr.
# agent_redis_url: redis://redis.example.com:6379

# agent_port is the gRPC port Flux dials on each agent (default: 50052)
agent_port: 50052

# certs_dir is where auto-generated TLS and SSH keys are stored.
# Default: /etc/flux/certs (Linux/macOS), %PROGRAMDATA%\flux\certs (Windows)
# certs_dir: /etc/flux/certs

providers:
  aws:
    region: us-east-1
    ami: ami-064519b8c76274859
    security_group_id: sg-0123456789abcdef0

    # Static credentials — optional.
    # When omitted, the default chain is used (env vars, ~/.aws/credentials, instance profile).
    # access_key_id: AKIAIOSFODNN7EXAMPLE
    # secret_access_key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY

    ssh_user: admin
    agent_version: "0.1.0"   # fetched from GitHub Releases as a .deb

    tags:
      Environment: production
      Team: platform

    # Shell commands to run on each new node before the agent is installed.
    # agent_setup_commands:
    #   - sudo apt-get update
    #   - sudo apt-get install -y curl

    autoscaling:
      enabled: true
      name: aws-prod

      min_nodes: 1
      max_nodes: 10

      # Instance types this autoscaler may launch (smallest to largest).
      node_types:
        - instance_type: c5.large
          vcpus: 2
          memory_gb: 4
        - instance_type: c5.xlarge
          vcpus: 4
          memory_gb: 8
        - instance_type: c5.2xlarge
          vcpus: 8
          memory_gb: 16
        - instance_type: m5.xlarge
          vcpus: 4
          memory_gb: 16
        - instance_type: r5.xlarge
          vcpus: 4
          memory_gb: 32

      cpu_upper_threshold: 80
      cpu_lower_threshold: 45
      mem_upper_threshold: 80
      mem_lower_threshold: 45

      evaluation_window_sec: 60
      poll_interval_sec: 10
      cooldown_sec: 300

  gcp:
    project_id: my-project
    zone: us-east5-a
    image: projects/debian-cloud/global/images/debian-13-trixie-v20260310

    # Static credentials — optional.
    # When omitted, Application Default Credentials are used
    # (GOOGLE_APPLICATION_CREDENTIALS env, gcloud auth, or GCE metadata).
    # credentials_file: /path/to/service-account.json

    # service_account_email: flux-agent@my-project.iam.gserviceaccount.com

    ssh_user: ubuntu
    agent_version: "0.1.0"

    labels:
      environment: production
      team: platform

    # Shell commands to run on each new node before the agent is installed.
    # agent_setup_commands:
    #   - sudo apt-get update
    #   - sudo apt-get install -y curl

    autoscaling:
      enabled: true
      name: gcp-prod

      min_nodes: 1
      max_nodes: 10

      node_types:
        - instance_type: e2-standard-2
          vcpus: 2
          memory_gb: 8
        - instance_type: e2-standard-4
          vcpus: 4
          memory_gb: 16
        - instance_type: e2-standard-8
          vcpus: 8
          memory_gb: 32

      cpu_upper_threshold: 80
      cpu_lower_threshold: 45
      mem_upper_threshold: 80
      mem_lower_threshold: 45

      evaluation_window_sec: 60
      poll_interval_sec: 10
      cooldown_sec: 300
